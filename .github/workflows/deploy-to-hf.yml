name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  # Configure your Hugging Face Space here (format: username/space-name)
  HF_SPACE: neo2momoka/socsci-deadlines

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: true

      - name: Push snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf /tmp/hf-deploy
          mkdir -p /tmp/hf-deploy
          rsync -a --delete \
            --exclude=".git" \
            --exclude="bun.lockb" \
            ./ /tmp/hf-deploy/

          cd /tmp/hf-deploy
          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push https://neo2momoka:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE main --force
