name: Validate Conference Data

on:
  pull_request:
    paths:
      - 'src/data/conferences/**'
      - 'scripts/validate-conferences.ts'
  push:
    branches: [main]
    paths:
      - 'src/data/conferences/**'
      - 'scripts/validate-conferences.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
